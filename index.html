<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Load fonts non-render-blocking: if the network blocks Google Fonts,
         the page still paints (falls back to Georgia / system fonts). -->
    <link
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,900&family=Inter:wght@400;500;600;700&display=swap"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,900&family=Inter:wght@400;500;600;700&display=swap"
      />
    </noscript>
    <meta name="description" content="Colin Owen Mutwiri Nyaga - Full-Stack Developer, Cybersecurity Enthusiast, and AI/ML Explorer from Catholic University of Eastern Kenya" />
    <meta name="keywords" content="portfolio, developer, cybersecurity, web development, mobile apps, AI, machine learning" />
    <meta name="author" content="Colin Owen Mutwiri Nyaga" />
    <meta property="og:title" content="Colin Owen — Notes on code, security & AI" />
    <meta property="og:description" content="The personal blog of Colin Owen Mutwiri Nyaga — writing about web development, cybersecurity, and AI/ML, with the projects behind the words." />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#fbfaf7" />
    <title>Colin Owen — Notes on code, security &amp; AI</title>
  </head>
  <body>
    <div id="app">
      <!-- Fallback shown only if the app never mounts (JS blocked/failed on the
           network). Vue replaces it on successful mount. Inline styles so it
           shows even if the stylesheet is blocked too. -->
      <div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; text-align: center; font-family: Georgia, 'Times New Roman', serif; background: #fbfaf7; color: #1d1b18;">
        <div>
          <div style="font-size: 1.5rem; font-weight: 600;">Colin Owen</div>
          <div style="margin-top: 0.5rem; color: #8b877e; font-family: Arial, sans-serif;">Loading the blog&hellip;</div>
          <div style="margin-top: 1.25rem; max-width: 22rem; font-size: 0.85rem; line-height: 1.5; color: #b23a1f; font-family: Arial, sans-serif;">
            If this message stays on screen, this network may be blocking part of the site. Try mobile data or a different Wi-Fi network.
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
